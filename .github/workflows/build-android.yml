name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'proxy/**'
      - 'android/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: '1.21'
  ANDROID_API_LEVEL: '34'
  SING_BOX_VERSION: '1.10.4'
  GRADLE_VERSION: '8.6'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Debug: Show repository structure
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== Proxy directory ==="
          ls -la proxy/ || echo "proxy/ not found"
          echo "=== Android directory ==="
          ls -la android/ || echo "android/ not found"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: proxy/go.sum

      - name: Build DPI Proxy
        run: |
          echo "=== Building Go proxy ==="
          cd proxy
          
          if [ ! -f go.mod ]; then
            echo "ERROR: go.mod not found in proxy/"
            ls -la
            exit 1
          fi
          
          echo "go.mod found, running go mod tidy..."
          go mod tidy
          go mod download
          go mod verify
          
          echo "Building for Android ARM64..."
          mkdir -p ../android/app/src/main/assets
          
          GOOS=android GOARCH=arm64 CGO_ENABLED=0 go build \
            -ldflags="-s -w" \
            -o ../android/app/src/main/assets/dpi-proxy .
          
          chmod +x ../android/app/src/main/assets/dpi-proxy
          ls -lh ../android/app/src/main/assets/dpi-proxy
          echo "✅ dpi-proxy built"

      - name: Download sing-box
        run: |
          echo "=== Downloading sing-box ==="
          mkdir -p android/app/src/main/assets
          
          URL="https://github.com/SagerNet/sing-box/releases/download/v${{ env.SING_BOX_VERSION }}/sing-box-${{ env.SING_BOX_VERSION }}-android-arm64.tar.gz"
          echo "Downloading: $URL"
          
          curl -fSL -o sing-box.tar.gz "$URL"
          tar -xzf sing-box.tar.gz -C android/app/src/main/assets \
            --strip-components=1 sing-box-${{ env.SING_BOX_VERSION }}-android-arm64/sing-box
          chmod +x android/app/src/main/assets/sing-box
          
          ls -lh android/app/src/main/assets/
          echo "✅ sing-box downloaded"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Setup Gradle wrapper
        run: |
          echo "=== Setting up Gradle ==="
          cd android
          if [ ! -f gradlew ]; then
            echo "Creating gradle wrapper..."
            gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }}
          fi
          chmod +x gradlew
          echo "Gradle wrapper ready"

      - name: Build APK
        run: |
          echo "=== Building Android APK ==="
          cd android
          
          echo "Checking assets..."
          ls -lh app/src/main/assets/
          
          ./gradlew assembleDebug --no-daemon --stacktrace
          
          echo "✅ APK built successfully"

      - name: Verify APK
        run: |
          echo "=== Verifying APK ==="
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          
          if [ -f "$APK_PATH" ]; then
            ls -lh "$APK_PATH"
            echo "APK contents (assets):"
            unzip -l "$APK_PATH" | grep assets || echo "No assets found in APK"
          else
            echo "ERROR: APK not found at $APK_PATH"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zapret-masked-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
