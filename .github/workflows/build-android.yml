name: Build Android APK (Embedded + Strategies)

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'proxy/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: '1.21'
  ANDROID_API_LEVEL: '34'
  SING_BOX_VERSION: '1.10.4'
  GRADLE_VERSION: '8.6'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # === Go: сборка dpi-proxy со стратегиями ===
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build DPI Proxy (obfuscated)
        run: |
          cd proxy
          go mod tidy
          go mod download
          mkdir -p ../android/app/src/main/assets
          
          # Сборка с флагами обфускации
          GOOS=android GOARCH=arm64 CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=${GITHUB_SHA::8}" \
            -o ../android/app/src/main/assets/dpi-proxy ./main.go
          
          chmod +x ../android/app/src/main/assets/dpi-proxy
          
          # Проверка размера и типа
          ls -lh ../android/app/src/main/assets/dpi-proxy
          file ../android/app/src/main/assets/dpi-proxy
          echo "✅ dpi-proxy built with obfuscation strategies"
          
          

      # === sing-box ===
      - name: Download sing-box
        run: |
          mkdir -p android/app/src/main/assets
          curl -fSL -o sing-box.tar.gz \
            "https://github.com/SagerNet/sing-box/releases/download/v${{ env.SING_BOX_VERSION }}/sing-box-${{ env.SING_BOX_VERSION }}-android-arm64.tar.gz"
          tar -xzf sing-box.tar.gz -C android/app/src/main/assets \
          --strip-components=1 sing-box-${{ env.SING_BOX_VERSION }}-android-arm64/sing-box
          chmod +x android/app/src/main/assets/sing-box
          echo "✅ sing-box embedded"

      # === Android SDK/NDK ===
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Setup Gradle
        run: |
          cd android
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }}
          fi
          chmod +x gradlew
      - name: 🔍 Show Kotlin Compilation Errors
        run: |
          cd android
          ./gradlew compileDebugKotlin --stacktrace 2>&1 | grep -B 5 -A 2 "e: file://" || echo "No Kotlin errors found"
      # === Сборка APK ===
      - name: Build APK
        run: |
          cd android
          # Проверяем, что бинарники на месте
          echo "📦 Assets before build:"
          ls -lh app/src/main/assets/
          
          ./gradlew assembleDebug --no-daemon --stacktrace

      # === Верификация ===
      - name: Verify APK
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          echo "📊 APK size: $(du -h $APK | cut -f1)"
          echo "🔍 Checking embedded binaries:"
          unzip -l "$APK" | grep -E "assets/(dpi-proxy|sing-box)" || echo "⚠️ Binaries not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zapret-masked-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
