name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'proxy/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: '1.21'
  SING_BOX_VERSION: '1.10.4'
  GRADLE_VERSION: '8.6'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go Proxy
        run: |
          cd proxy
          go mod tidy
          go mod download
          go mod verify
          mkdir -p ../android/app/src/main/assets
          GOOS=android GOARCH=arm64 CGO_ENABLED=0 go build \
            -ldflags="-s -w" \
            -o ../android/app/src/main/assets/dpi-proxy .
          chmod +x ../android/app/src/main/assets/dpi-proxy
          echo "✅ dpi-proxy built"

      - name: Download sing-box
        run: |
          mkdir -p android/app/src/main/assets
          curl -fSL -o sb.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${{ env.SING_BOX_VERSION }}/sing-box-${{ env.SING_BOX_VERSION }}-android-arm64.tar.gz"
          tar -xzf sb.tar.gz -C android/app/src/main/assets --strip-components=1
          chmod +x android/app/src/main/assets/sing-box
          echo "✅ sing-box ready"

      - name: Setup Java & Android
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd android
          if [ ! -f gradlew ]; then gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }}; fi
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zapret-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
