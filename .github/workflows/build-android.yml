name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Build proxy
        run: |
          cd proxy
          go mod tidy
          mkdir -p ../android/app/src/main/assets
          GOOS=android GOARCH=arm64 CGO_ENABLED=0 go build -o ../android/app/src/main/assets/dpi-proxy .
          chmod +x ../android/app/src/main/assets/dpi-proxy
      - name: Download sing-box
        run: |
          mkdir -p android/app/src/main/assets
          curl -fSL -o sb.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.10.4/sing-box-1.10.4-android-arm64.tar.gz
          tar -xzf sb.tar.gz -C android/app/src/main/assets --strip-components=1
          chmod +x android/app/src/main/assets/sing-box
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew 2>/dev/null || gradle wrapper
          ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
